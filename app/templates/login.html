{% extends "base.html" %}
{% block content %}
<div class="auth-wrap">
  <form class="card auth-card" method="post" action="/auth/login">
    <h1>Iniciar sesión</h1>
    <label>Usuario o email<input type="text" name="email" required></label>
    <label>Contraseña<input type="password" name="password" required></label>
    <button class="btn primary" type="submit">Entrar</button>
    <p class="muted">Acceso gestionado por el super usuario.</p>
  </form>
</div>
{% endblock %}
