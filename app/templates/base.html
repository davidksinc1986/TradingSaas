<!doctype html>
<html lang="{{ locale or 'es' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ title }} • {{ tr('app.name') }}</title>
  <link rel="stylesheet" href="/static/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="brand"><strong class="brand-name">{{ tr('app.name') }}</strong> <small class="brand-cutline">{{ tr('app.tagline') }}</small></div>
    <nav class="nav">
      <a href="/">Inicio</a>
      <a href="/dashboard">Dashboard</a>
      {% if user and user.is_admin %}<a href="/admin">Admin</a>{% endif %}
      {% if user %}<a href="/auth/logout" id="nav-logout">Salir</a>{% else %}<a href="/auth/login" id="nav-login">Login</a>{% endif %}
    </nav>
  </header>
  <main class="page">
    {% block content %}{% endblock %}
  </main>
  <div id="guide-modal" class="modal hidden">
    <div class="modal-card card">
      <div class="modal-head">
        <h3 id="guide-title">Guía</h3>
        <button class="btn" onclick="window.closeGuideModal?.()">Cerrar</button>
      </div>
      <p id="guide-summary" class="hint"></p>
      <div class="grid-2 modal-grid">
        <div>
          <h4>Datos requeridos</h4>
          <ul id="guide-fields" class="modal-list"></ul>
        </div>
        <div>
          <h4>Paso a paso</h4>
          <ol id="guide-steps" class="modal-list"></ol>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
