{% extends "base.html" %}
{% block content %}
<div class="auth-wrap">
  <form class="card auth-card" method="post" action="/auth/register">
    <h1>Crear cuenta</h1>
    <label>Nombre<input type="text" name="name" required></label>
    <label>Email<input type="email" name="email" required></label>
    <label>Contraseña<input type="password" name="password" minlength="6" required></label>
    <button class="btn primary" type="submit">Crear usuario</button>
    <p class="muted">¿Ya tienes cuenta? <a href="/auth/login">Inicia sesión</a></p>
  </form>
</div>
{% endblock %}
