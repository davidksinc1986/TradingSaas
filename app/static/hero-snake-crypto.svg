    <line x1="390" y1="900" x2="390" y2="690"/>
    <line x1="560" y1="900" x2="560" y2="720"/>
    <line x1="730" y1="900" x2="730" y2="640"/>
    <line x1="900" y1="900" x2="900" y2="570"/>
