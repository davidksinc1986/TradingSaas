<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1536 1024" role="img" aria-labelledby="title desc">
  <title id="title">Serpiente dorada sobre gráfica alcista</title>
  <desc id="desc">Ilustración oscura con línea de crecimiento dorada y cabeza de serpiente.</desc>
  <defs>
    <radialGradient id="bgGlow" cx="45%" cy="62%" r="52%">
      <stop offset="0%" stop-color="#f8b80a" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lineGold" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#e29b03"/>
      <stop offset="50%" stop-color="#ffcb2f"/>
      <stop offset="100%" stop-color="#ffd967"/>
    </linearGradient>
    <filter id="lineGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1536" height="1024" fill="#07090f"/>
  <rect width="1536" height="1024" fill="url(#bgGlow)"/>

  <g opacity="0.15" stroke="#f5b31f" fill="none" stroke-width="8">
