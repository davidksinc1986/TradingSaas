
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 800">
<defs>
<linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#fff3a0"/>
<stop offset="50%" stop-color="#ffc400"/>
<stop offset="100%" stop-color="#9a6a00"/>
</linearGradient>

<filter id="spray">
<feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" result="noise"/>
<feDisplacementMap in="SourceGraphic" in2="noise" scale="4"/>
</filter>

<filter id="glow">
<feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#ffc400"/>
</filter>
</defs>

<g transform="translate(120 330)" filter="url(#spray)">
<text font-family="Impact, Arial Black, sans-serif"
font-size="170"
font-weight="900"
letter-spacing="6"
fill="url(#gold)"
filter="url(#glow)">SNAKE MAFIA TRADING</text>
</g>

<g transform="translate(260 520)">
<text font-family="Arial, Helvetica, sans-serif"
font-size="40"
letter-spacing="10"
fill="#e6b200">QUANTUM COMPUTING MATHEMATICS</text>
</g>

</svg>
